name: Build & Publish Debug APK

on:
  push:
    branches:
      - main # توجه: اگر نام شاخه اصلی شما master است، آن را به master تغییر دهید.

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4 # @v4 نسخه جدیدتر و توصیه شده است

    - name: Set up JDK 1.8
      uses: actions/setup-java@v4 # @v4 نسخه جدیدتر و توصیه شده است
      with:
        java-version: "8"
        distribution: 'temurin' # استفاده از OpenJDK که رایج‌تر است

    - name: Make Gradle executable
      run: chmod +x ./gradlew

    - name: Build Release APK
      run: ./gradlew assembleRelease

    - name: Build Debug APK
      run: ./gradlew assembleDebug

# مرحله آپلود APK به عنوان Artifact
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4 # <--- اینجا v3 را به v4 تغییر دادیم
      with:
        name: app-debug # نام artifact که با آن دانلود می‌شود
        path: app/build/outputs/apk/debug/app-debug.apk # مسیر فایل APK خروجی (مسیر پیش‌فرض)
        retention-days: 5 # مدت زمانی که artifact نگه داشته می‌شود (اختیاری)
