name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'نوع build'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - debug

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    
    # افزایش تایم‌اوت برای دانلود دپندنسی‌ها
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.19.6'  # نسخه پایدار و تست شده

      - name: Enable Flutter for current user
        run: |
          flutter doctor -v
          flutter precache

      - name: Clean everything
        run: |
          rm -rf ~/.pub-cache
          rm -rf .dart_tool/
          rm -rf build/
          rm -f pubspec.lock
          flutter clean

      - name: Get dependencies fresh
        run: |
          flutter pub get --no-example
          
      - name: Verify dependencies
        run: |
          flutter pub deps
          
      - name: Build APK
        run: |
          flutter build apk --${{ github.event.inputs.build_type || 'release' }} --verbose

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ github.event.inputs.build_type || 'release' }}-${{ github.run_number }}
          path: |
            build/app/outputs/flutter-apk/*.apk
            build/app/outputs/apk/**/*.apk
          if-no-files-found: error
          retention-days: 30
