name: Build Android APK

on:
  # اجرای دستی (بهترین گزینه برای گرفتن خروجی)
  workflow_dispatch:
    inputs:
      build_type:
        description: 'نوع build'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - debug

  # (اختیاری) اجرا روی push به شاخه اصلی
  push:
    branches: [ main, master ]

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'  # مهم: Java 17 برای Gradle 8 لازم است [citation:4][citation:5]

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.22.0'  # نسخه خودتان را جایگزین کنید

      - name: Install dependencies
        run: flutter pub get

      - name: Clean previous build
        run: flutter clean

      - name: Build APK
        run: flutter build apk --${{ github.event.inputs.build_type || 'release' }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ github.event.inputs.build_type || 'release' }}
          path: build/app/outputs/flutter-apk/app-*.apk
          retention-days: 30
